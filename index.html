<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio - Spotify</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .card { background: white; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 32px; margin-bottom: 20px; color: #191414; }
        p { font-size: 16px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        button { padding: 14px 32px; font-size: 16px; font-weight: bold; background: #1DB954; color: white; border: none; border-radius: 24px; cursor: pointer; width: 100%; }
        button:hover { background: #1ed760; }
        .features { margin-top: 30px; text-align: left; background: #f7f7f7; padding: 20px; border-radius: 8px; }
        .features h3 { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #191414; }
        .features div { font-size: 13px; color: #666; margin: 8px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 AI Radio</h1>
            <p>당신의 Spotify 계정을 연결하고 AI DJ와 함께 음악을 즐기세요!</p>
            <button onclick="spotifyLogin()">Spotify로 로그인</button>
            <div class="features">
                <h3>앱 기능:</h3>
                <div>✓ Spotify 음악 라이브러리</div>
                <div>✓ 당신의 플레이리스트</div>
                <div>✓ AI DJ 채팅 (영어)</div>
                <div>✓ 음악 추천</div>
                <div>✓ 정치 & 음악</div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '2a4445aa9ee94ce9a05641698df5c822';
        const REDIRECT_URI = 'https://[당신의앱주소]/callback';
        
        function spotifyLogin() {
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=user-read-private%20user-read-email%20user-top-read%20playlist-read-private`;
            window.location.href = authUrl;
        }
    </script>
</body>
</html>
