<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Radio</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; }
        button { width: 100%; padding: 15px; font-size: 16px; background: #1DB954; color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1ed760; }
        .features { margin-top: 30px; text-align: left; background: #f7f7f7; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 AI Radio</h1>
        <p>Spotify와 함께하는 AI 라디오</p>
        <button id="loginBtn">Spotify로 로그인</button>
        <div class="features">
            <h3>기능:</h3>
            <p>✓ Spotify 음악 라이브러리</p>
            <p>✓ AI DJ 채팅</p>
            <p>✓ 플레이리스트</p>
        </div>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', function() {
            const CLIENT_ID = '2a4445aa9ee94ce9a05641698df5c822';
            const REDIRECT = 'https://yurie0121.vercel.app/callback';
            const scope = 'user-read-private user-read-email';
            const url = 'https://accounts.spotify.com/authorize?client_id=' + CLIENT_ID + '&response_type=code&redirect_uri=' + encodeURIComponent(REDIRECT) + '&scope=' + encodeURIComponent(scope);
            window.location.href = url;
        });
    </script>
</body>
</html>
